name: Scheduled Internshala Scraper

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip' # Recommended: speeds up future runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Internshala scraper
        # ✅ THE FIX: PYTHONPATH tells Python where to find 'utils'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python scrapers/internshala_inp_scraper.py

      - name: Commit and push changes
        run: |
            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"
        
            git add .
            git commit -m "Automated internship data update" || echo "No changes to commit"
        
            git pull --rebase origin main
            git push origin main

