name: RemoteOK Scraper Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas

      - name: Run scraper
        run: python remoteok_scraper.py


       - name: Run scraper
         run: 
               python remoteok_scraper.py
